<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dear Sun 🌸</title>
    <meta name="description" content="Made with love — especially for you.">
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/sun0225SUN/photos/img/20210715233345.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Lora:ital@0;1&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; border: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --rose:    #e8587a;
            --rose-lt: #f9b8c8;
            --cream:   #fff8f4;
            --ink:     #3a1a25;
            --gold:    #e8a87c;
        }

        html {
            height: 100%;
            overscroll-behavior: none;
        }
        body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--cream);
            font-family: 'Lora', serif;
            color: var(--ink);
            touch-action: none;
        }

        /* gradient bg */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 60% at 20% 80%, rgba(232,88,122,.13) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(249,184,200,.18) 0%, transparent 65%),
                radial-gradient(ellipse 50% 80% at 50% 50%, rgba(232,168,124,.08) 0%, transparent 80%);
        }

        /* petals */
        .petals { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
        .petal { position: absolute; opacity: 0; animation: fall linear infinite; }
        @keyframes fall {
            0%   { opacity: 0; transform: translateY(-40px) rotate(0deg); }
            10%  { opacity: .6; }
            90%  { opacity: .4; }
            100% { opacity: 0; transform: translateY(110vh) rotate(540deg); }
        }

        /* title */
        .title-wrap {
            position: fixed;
            top: max(14px, env(safe-area-inset-top, 14px));
            left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 50;
            width: 90%; pointer-events: none;
        }
        .title-wrap h1 {
            font-family: 'Sacramento', cursive;
            font-size: clamp(2rem, 10vw, 3.8rem);
            color: var(--rose); line-height: 1;
            text-shadow: 0 2px 16px rgba(232,88,122,.3);
            white-space: nowrap;
        }
        .title-wrap p {
            font-family: 'Lora', serif; font-style: italic;
            font-size: clamp(.6rem, 3vw, .85rem);
            color: var(--gold); margin-top: 2px; letter-spacing: .1em;
        }

        /* container */
        .container { position: fixed; inset: 0; user-select: none; -webkit-user-select: none; }

        /* gif */
        .body_left {
            position: absolute; left: 0; bottom: 56px; z-index: 98;
            filter: drop-shadow(0 6px 18px rgba(232,88,122,.25));
            animation: floatY 4s ease-in-out infinite;
        }
        .body_left img { width: 100%; height: 100%; object-fit: contain; display: block; }
        @keyframes floatY {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }

        /* love grid */
        .love {
            position: absolute;
            filter: drop-shadow(0 0 20px rgba(232,88,122,.35));
        }
        .love .block { position: absolute; visibility: hidden; }
        .love .block div { position: absolute; background: url("heart.png") no-repeat center / contain; }

        @keyframes pop-in {
            0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
            60%  { transform: scale(1.2) rotate(8deg);  opacity: 1; }
            100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
        }

        /* footer */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 48px; z-index: 200;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
        }
        .footer .lines { width: 100%; position: absolute; top: 0; }
        .line-black, .line-red { display: block; height: 2px; }
        .line-black { background: var(--ink); width: 0; }
        .line-red   { background: var(--rose); width: 0; margin-left: auto; }
        .line-black.run { animation: grow-line 12s linear forwards; }
        .line-red.run   { animation: grow-line 7s linear 12s forwards; }
        @keyframes grow-line { from { width:0; } to { width:100%; } }

        .footer .credit {
            position: relative; z-index: 2;
            font-family: 'Sacramento', cursive;
            font-size: clamp(.88rem, 4.5vw, 1.2rem);
            color: var(--ink); opacity: 0;
            letter-spacing: .05em; text-align: center; padding: 0 12px;
        }
        .footer .credit.run {
            animation: fade-up 1.2s ease 13s forwards;
        }
        .footer .credit .heart-icon { color: var(--rose); }
        .footer .credit .name       { color: var(--rose); font-style: italic; }
        @keyframes fade-up {
            from { opacity:0; transform:translateY(8px); }
            to   { opacity:.75; transform:translateY(0); }
        }

        /* music btn */
        .music-btn {
            position: fixed;
            top: max(14px, env(safe-area-inset-top, 14px)); right: 16px;
            z-index: 300;
            background: rgba(255,255,255,.65);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid var(--rose-lt); border-radius: 50%;
            width: 40px; height: 40px; font-size: 17px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 12px rgba(232,88,122,.18);
            touch-action: manipulation;
        }
        .music-btn.paused { filter: grayscale(.6); }

        /* name screen */
        #name-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--cream);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px 20px;
            transition: opacity .7s ease, transform .7s ease;
        }
        #name-screen::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 60% at 20% 80%, rgba(232,88,122,.13) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(249,184,200,.18) 0%, transparent 65%);
        }
        #name-screen.hide { opacity:0; transform:scale(1.03); pointer-events:none; }

        .ns-emoji {
            font-size: clamp(2rem, 10vw, 3rem); margin-bottom: 10px;
            animation: bounce-soft 2s ease-in-out infinite;
        }
        @keyframes bounce-soft {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
        .ns-heading {
            font-family: 'Sacramento', cursive;
            font-size: clamp(2rem, 11vw, 4rem);
            color: var(--rose); text-shadow: 0 2px 16px rgba(232,88,122,.25);
            line-height: 1; margin-bottom: 6px; text-align: center;
        }
        .ns-sub {
            font-family: 'Lora', serif; font-style: italic;
            font-size: clamp(.68rem, 3.5vw, .92rem);
            color: var(--gold); letter-spacing: .1em;
            margin-bottom: 28px; text-align: center;
        }
        .ns-input-wrap {
            display: flex; align-items: stretch;
            width: min(320px, 88vw);
            border-radius: 50px; overflow: hidden;
            box-shadow: 0 4px 20px rgba(232,88,122,.18);
        }
        #name-input {
            flex: 1; font-family: 'Lora', serif; font-size: 1rem;
            color: var(--ink); background: rgba(255,255,255,.88);
            border: 2px solid var(--rose-lt); border-right: none;
            border-radius: 50px 0 0 50px; padding: 13px 18px;
            outline: none; -webkit-appearance: none;
            transition: border-color .25s, box-shadow .25s;
            caret-color: var(--rose);
        }
        #name-input::placeholder { color: rgba(58,26,37,.35); font-style: italic; }
        #name-input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(232,88,122,.12); }
        #name-input.shake { animation: shake .4s ease; border-color: #c0392b; }
        @keyframes shake {
            0%,100% { transform:translateX(0); }
            20% { transform:translateX(-7px); }
            40% { transform:translateX(7px); }
            60% { transform:translateX(-5px); }
            80% { transform:translateX(3px); }
        }
        #name-submit {
            font-family: 'Sacramento', cursive; font-size: 1.1rem;
            background: var(--rose); color: #fff; border: none;
            border-radius: 0 50px 50px 0; padding: 13px 22px;
            cursor: pointer; white-space: nowrap;
            touch-action: manipulation; transition: background .2s;
        }
        #name-submit:active { background: #d44368; }
        .ns-hint {
            margin-top: 10px; font-family: 'Lora', serif; font-style: italic;
            font-size: .78rem; color: rgba(58,26,37,.4);
            letter-spacing: .04em; min-height: 18px; text-align: center;
        }
        .ns-hint.error { color: #c0392b; }
    </style>
</head>
<body>

<!-- Name Screen -->
<div id="name-screen">
    <div class="ns-emoji">🌸</div>
    <h1 class="ns-heading">who is this for?</h1>
    <p class="ns-sub">enter their name to open this page</p>
    <div class="ns-input-wrap">
        <input id="name-input" type="text" placeholder="their name..." maxlength="30"
               autocomplete="off" spellcheck="false" enterkeyhint="go">
        <button id="name-submit">open ♥</button>
    </div>
    <p class="ns-hint" id="ns-hint">&nbsp;</p>
</div>

<!-- Petals -->
<div class="petals" id="petals"></div>

<!-- Audio -->
<audio id="bgm" loop preload="auto"><source src="1.mp3" type="audio/mpeg"></audio>
<button class="music-btn paused" id="musicBtn">🔇</button>

<!-- Title -->
<div class="title-wrap">
    <h1 id="main-title">Dear Sun</h1>
    <p>you are my favourite constellation ✦</p>
</div>

<!-- Main -->
<div class="container">
    <div class="body_left" id="gif-wrap">
        <img src="biubiubiu.gif" alt="" draggable="false">
    </div>
    <div class="love" id="love">
        <div class="block" id="tpl-block">
            <div></div><div></div><div></div><div></div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="footer" id="footer">
    <div class="lines">
        <span class="line-black" id="line-black"></span>
        <span class="line-red"   id="line-red"></span>
    </div>
    <p class="credit" id="footer-credit">
        made with <span class="heart-icon">♥</span> by <span class="name">Zade</span> &nbsp;—&nbsp; especially for u 🌸
    </p>
</div>

<script>
'use strict';

/* ── refs ── */
const bgm      = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
const loveEl   = document.getElementById('love');
const tpl      = document.getElementById('tpl-block');

/* ── grid constants ── */
const COLS = 13, ROWS = 11;

function cellSize() {
    const maxW = Math.floor(window.innerWidth  * 0.88 / COLS);
    const maxH = Math.floor(window.innerHeight * 0.54 / ROWS);
    return Math.min(maxW, maxH, 40);
}

function applyLayout() {
    const C = cellSize();
    const W = COLS * C, H = ROWS * C;
    loveEl.style.cssText = `width:${W}px;height:${H}px;left:50%;top:50%;transform:translate(-50%,-50%);filter:drop-shadow(0 0 20px rgba(232,88,122,.35));`;
    loveEl.dataset.cell = C;
    // size all block-divs
    loveEl.querySelectorAll('.block div').forEach(d => { d.style.width = d.style.height = C + 'px'; });

    const gif = Math.min(Math.max(Math.round(window.innerWidth * .24), 76), 170);
    const gw  = document.getElementById('gif-wrap');
    gw.style.width = gw.style.height = gif + 'px';
}
window.addEventListener('resize', applyLayout);
applyLayout();

/* ── petals ── */
(function() {
    const cont = document.getElementById('petals');
    ['🌸','🌺','💮','🌷','✿','❀','🌼'].forEach((e, i) => {
        for (let j = 0; j < 3; j++) {
            const p = document.createElement('span');
            p.className = 'petal';
            p.textContent = e;
            const sz = 10 + Math.random() * 13;
            p.style.cssText = `left:${Math.random()*100}%;font-size:${sz}px;animation-duration:${8+Math.random()*11}s;animation-delay:${Math.random()*22}s;`;
            cont.appendChild(p);
        }
    });
})();

/* ── music ── */
musicBtn.addEventListener('click', () => {
    if (bgm.paused) {
        bgm.play().catch(() => {});
        musicBtn.textContent = '🎵';
        musicBtn.classList.remove('paused');
    } else {
        bgm.pause();
        musicBtn.textContent = '🔇';
        musicBtn.classList.add('paused');
    }
});

/* ── name screen ── */
(function() {
    const screen = document.getElementById('name-screen');
    const input  = document.getElementById('name-input');
    const btn    = document.getElementById('name-submit');
    const hint   = document.getElementById('ns-hint');

    function submit() {
        const name = input.value.trim();
        if (!name) {
            hint.textContent = 'please enter a name first 🌸';
            hint.classList.add('error');
            input.classList.remove('shake');
            void input.offsetWidth;
            input.classList.add('shake');
            input.addEventListener('animationend', () => input.classList.remove('shake'), { once: true });
            input.focus();
            return;
        }

        document.getElementById('main-title').textContent = 'Dear ' + name;
        document.title = 'Dear ' + name + ' 🌸';
        setFooterName(name);

        screen.classList.add('hide');
        screen.addEventListener('transitionend', () => screen.remove(), { once: true });

        bgm.play().then(() => {
            musicBtn.textContent = '🎵';
            musicBtn.classList.remove('paused');
        }).catch(() => {});

        startHeart();
    }

    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    input.addEventListener('input', () => { hint.textContent = '\u00a0'; hint.classList.remove('error'); });
    window.addEventListener('load', () => { try { input.focus(); } catch(e){} }, { once: true });
})();

function setFooterName(name) {
    document.getElementById('footer-credit').innerHTML =
        `made with <span class="heart-icon">♥</span> by <span class="name">Zade</span> &nbsp;—&nbsp; especially for <span class="name">${name}</span> 🌸`;
}

/* ── heart data ── */
const blk_pitn = {
    block1:[[0,1],[0,0],[-1,0],[-1,-1]], block2:[[0,1],[0,0],[-1,0],[0,-1]],
    block3:[[-1,1],[0,0],[-1,0],[-1,-1]], block4:[[0,1],[0,0],[-1,0],[-1,-1]],
    block5:[[-1,1],[0,0],[-1,0],[0,-1]], block6:[[0,-1],[0,0],[-1,0],[1,-1]],
    block7:[[-1,-1],[0,0],[-1,0],[1,0]], block8:[[-1,1],[0,0],[-1,0],[-1,-1]],
    block9:[[0,-1],[0,0],[-1,0],[1,0]], block10:[[-1,1],[0,0],[-1,0],[1,0]],
    block11:[[2,0],[0,0],[-1,0],[1,0]], block12:[[0,1],[0,0],[-1,0],[0,-1]],
    block13:[[0,1],[0,0],[-1,0],[-1,-1]], block14:[[1,1],[0,0],[-1,0],[1,0]],
    block15:[[1,-1],[0,0],[-1,0],[1,0]], block16:[[-1,-1],[0,0],[-1,0],[1,0]],
    block17:[[0,1],[0,0],[-1,0],[0,-1]], block18:[[0,1],[0,0],[-1,0],[-1,-1]],
    block19:[[0,-1],[0,0],[-1,0],[1,0]], block20:[[1,-1],[0,0],[-1,0],[1,0]],
    block21:[[0,1],[0,0],[-1,0],[-1,-1]], block22:[[1,1],[0,0],[-1,0],[1,0]],
    block23:[[0,2],[0,0],[0,-1],[0,1]]
};
const offset_pitn = {
    block1:[5,3], block2:[5,1], block3:[3,4], block4:[3,2], block5:[3,-1],
    block6:[2,5], block7:[2,1], block8:[1,-1], block9:[1,-3], block10:[1,2],
    block11:[0,3], block12:[0,0], block13:[-1,-4], block14:[0,-2],
    block15:[-2,4], block16:[-2,2], block17:[-2,0], block18:[-3,-2],
    block19:[-4,0], block20:[-3,5], block21:[-5,3], block22:[-4,1], block23:[-6,1]
};

let mainTimer = null, riseTimer = null;

/* ── reset ── */
function resetAll() {
    if (mainTimer) { clearInterval(mainTimer); mainTimer = null; }
    if (riseTimer)  { clearInterval(riseTimer);  riseTimer = null; }

    // Remove clones, keep tpl
    Array.from(loveEl.querySelectorAll('.block')).forEach(b => {
        if (b.id !== 'tpl-block') b.remove();
    });

    // Restore tpl
    tpl.style.cssText = 'visibility:hidden;position:absolute;';
    tpl.children[2].style.display = '';
    Array.from(tpl.children).forEach(ch => {
        ch.style.animation = '';
        ch.style.animationName = '';
        ch.style.display = '';
    });

    // Re-centre love
    applyLayout();
    loveEl.style.filter     = 'drop-shadow(0 0 20px rgba(232,88,122,.35))';
    loveEl.style.transition = '';

    // Reset footer lines by replacing them (re-triggers animations)
    const lb = document.getElementById('line-black');
    const lr = document.getElementById('line-red');
    const credit = document.getElementById('footer-credit');

    lb.classList.remove('run');
    lr.classList.remove('run');
    credit.classList.remove('run');
    credit.style.opacity = '0';

    void lb.offsetWidth; // reflow
    lb.classList.add('run');
    lr.classList.add('run');
    credit.classList.add('run');
}

/* ── main animation loop ── */
function startHeart() {
    resetAll();

    const C = parseInt(loveEl.dataset.cell) || cellSize();

    tpl.style.top    = '50%';
    tpl.style.left   = '50%';
    tpl.style.margin = `-${Math.round(C/2)}px 0 0 -${Math.round(C/2)}px`;
    tpl.style.visibility = 'hidden';

    // Must read position AFTER style is applied
    const blk_left = parseFloat(getComputedStyle(tpl).left);
    const blk_top  = parseFloat(getComputedStyle(tpl).top);

    let idx = 0;

    function Next() {
        if (++idx >= 24) {
            clearInterval(mainTimer);
            mainTimer = null;
            Rise(blk_top, C);
            return;
        }

        tpl.style.visibility = 'visible';
        tpl.style.left = (blk_left + C * offset_pitn['block'+idx][0]) + 'px';
        tpl.style.top  = (blk_top  - C * offset_pitn['block'+idx][1]) + 'px';

        for (let i = 0; i < tpl.children.length; i++) {
            const ch = tpl.children[i];
            ch.style.width  = C + 'px';
            ch.style.height = C + 'px';
            ch.style.left   = blk_pitn['block'+idx][i][0] * -C + 'px';
            ch.style.top    = blk_pitn['block'+idx][i][1] * -C + 'px';
            // Restart animation
            ch.style.animation = 'none';
            void ch.offsetWidth;
            ch.style.animation = `pop-in .45s cubic-bezier(.34,1.56,.64,1) ${(i*0.06).toFixed(2)}s both`;
        }

        const clone = tpl.cloneNode(true);
        loveEl.appendChild(clone);

        const allBlocks = loveEl.querySelectorAll('.block');
        if (allBlocks.length >= 23) {
            tpl.children[2].style.display = 'none';
            tpl.style.display = 'none';
        }
    }

    mainTimer = setInterval(Next, 280);
}

function Rise(original_top, C) {
    loveEl.style.transition = 'filter .5s';
    loveEl.style.filter     = 'drop-shadow(0 0 36px rgba(232,88,122,.65))';

    let dist    = 0;
    const target = Math.round(window.innerHeight * 0.13);
    const currTop = parseFloat(loveEl.style.top) || original_top;

    riseTimer = setInterval(() => {
        dist++;
        loveEl.style.top = (currTop - dist) + 'px';
        if (dist >= target) {
            clearInterval(riseTimer);
            riseTimer = null;
            // ── AUTO RESTART ──
            setTimeout(startHeart, 2800);
        }
    }, 22);
}
</script>
</body>
</html>
